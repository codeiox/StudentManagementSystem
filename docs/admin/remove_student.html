<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remove Student</title>
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>
  <div class="sidebar">
    <h2>Admin</h2>
    <a href="/admin/dashboard.html">Dashboard</a>
    <a href="/admin/new_student.html">Add Student</a>
    <a href="/admin/remove_student.html" class="active">Remove Student</a>
    <a href="/admin/list_students.html">List Students</a>
  </div>

  <div class="main">
    <h1>Remove Student</h1>
<form id="removeStudentForm">
  <label for="studentId">Student ID:</label>
  <input type="text" id="studentId" name="studentId" required>
  <button type="submit">Remove Student</button>
</form>

<p id="message"></p>

<script>
document.getElementById("removeStudentForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = document.getElementById("studentId").value;

  const response = await fetch(`/api/admin/students/${id}`, {
    method: "DELETE"
  });

  const text = await response.text();
  document.getElementById("message").textContent = text;
});
</script>

  </div>
</body>
</html>
